<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LLM Router</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🚀 Intelligent LLM Routing System</h1>

  <div class="container">
    <textarea id="query" placeholder="Enter your query..."></textarea>

    <select id="mode">
      <option value="fast">⚡ Fast</option>
      <option value="balanced">⚖️ Balanced</option>
      <option value="accurate">🎯 Accurate</option>
    </select>

    <button onclick="handleSubmit()">Run</button>

    <div class="output">
      <h3>Answer:</h3>
      <p id="answer">---</p>

      <h3>Confidence:</h3>
      <p id="confidence">---</p>

      <h3>Model Used:</h3>
      <p id="model">---</p>

      <h3>Cost:</h3>
      <p id="cost">---</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
